name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required project files
        run: |
          test -f index.html
          test -f shop.html
          test -f visit.html
          test -f staff-login.html
          test -f dashboard.html
          test -f styles.css
          test -f app.js
          test -f supabase/config.toml
          test -f supabase/migrations/202603130001_initial_schema.sql
          test -f supabase/migrations/202603130002_staff_access_policies.sql
          test -f supabase/seed.sql
